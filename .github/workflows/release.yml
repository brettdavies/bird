# Build release binaries on version tag push (e.g. v0.1.0) and attach to GitHub Release.
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: bird
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            artifact: bird
            target: aarch64-apple-darwin
          - os: windows-latest
            artifact: bird.exe
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # Prod app OAuth2 client_id; source: docs/SECRETS.md
          BIRD_DEFAULT_CLIENT_ID: ${{ secrets.BIRD_DEFAULT_CLIENT_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bird-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/bird-*; do
            [ ! -d "$dir" ] && continue
            name=$(basename "$dir")
            f=$(find "$dir" -type f \( -name bird -o -name bird.exe \) | head -1)
            [ -n "$f" ] && cp "$f" "release/${name}${f##*bird}"
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
